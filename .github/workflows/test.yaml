name: Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Unit tests + lint (no Docker required)
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Run unit tests
        run: go test ./... -v -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  # Integration tests (requires Docker for OpenBao)
  integration:
    runs-on: ubuntu-latest
    needs: unit  # only run after unit tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: go test ./pkg/vault/ -tags=integration -v -count=1 -timeout 300s


# for now only vault integration is tested, We could simulate a rke2 cluster install with the cli even on a runner to test it ?
